# Publishes the desktop client for every OS as self-contained single-file builds, attached to the
# GitHub release when one is published. Plain pushes only compile-check the desktop through ci.yml;
# packaging four platforms is release work.
name: Desktop client

on:
  release:
    types: [ published ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # The osx legs run on macOS for codesign: assembling the .app invalidates the publish-time
        # signature, and Gatekeeper reports a broken seal as "damaged". Re-sealing needs Apple's
        # codesign, which does not exist on Linux.
        include:
          - { rid: win-x64, os: ubuntu-latest }
          - { rid: linux-x64, os: ubuntu-latest }
          - { rid: osx-x64, os: macos-latest }
          - { rid: osx-arm64, os: macos-latest }
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish TwilightBoxart.Desktop -c Release -r ${{ matrix.rid }} \
            --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=none -o publish/${{ matrix.rid }}

      # macOS wants a real .app bundle: without one there is no Dock icon and Finder shows a bare
      # executable. The two osx RIDs get wrapped; Windows and Linux ship the single published file bare.
      - name: Bundle .app (macOS)
        if: startsWith(matrix.rid, 'osx-')
        run: |
          APP=publish/${{ matrix.rid }}/TwilightBoxart.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          mv publish/${{ matrix.rid }}/TwilightBoxart.Desktop "$APP/Contents/MacOS/TwilightBoxart"
          find publish/${{ matrix.rid }} -maxdepth 1 -type f -exec mv {} "$APP/Contents/MacOS/" \;
          cp TwilightBoxart.Desktop/macos/Info.plist "$APP/Contents/"
          cp TwilightBoxart.Desktop/macos/logo.icns "$APP/Contents/Resources/"
          chmod +x "$APP/Contents/MacOS/TwilightBoxart"
          # Ad-hoc, not notarized: users still clear quarantine once (see the README), but without
          # a valid seal even that would not help.
          codesign --force --deep -s - "$APP"
          codesign --verify --deep --strict "$APP"

      # win/linux publish to a single self-contained file (the csproj strips the loose .pdb/.xml
      # sidecars), so ship that file bare — no zip to unpack, just download and run. Only macOS,
      # whose .app is a directory that must stay sealed, still needs an archive.
      - name: Package
        run: |
          cd publish/${{ matrix.rid }}
          case "${{ matrix.rid }}" in
            win-x64)
              mv TwilightBoxart.Desktop.exe ../../TwilightBoxart-${{ matrix.rid }}.exe ;;
            linux-x64)
              mv TwilightBoxart.Desktop ../../TwilightBoxart-${{ matrix.rid }}
              chmod +x ../../TwilightBoxart-${{ matrix.rid }} ;;
            osx-*)
              # ditto is the zip Finder trusts: plain zip drops the metadata the signature seals.
              ditto -c -k --keepParent TwilightBoxart.app ../../TwilightBoxart-Desktop-${{ matrix.rid }}.zip ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.rid }}
          path: TwilightBoxart-*${{ matrix.rid }}*

  release:
    if: github.event_name == 'release'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
