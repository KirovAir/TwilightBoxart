name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TwilightBoxart.slnx

      - name: Build
        run: dotnet build TwilightBoxart.slnx -c Release --no-restore

      - name: Test
        # No VSTest-era flags here (--nologo, --verbosity ...). global.json selects Microsoft.Testing
        # .Platform, and the CLI forwards unrecognised flags to the test host, which rejects them and
        # then reports "Zero tests ran" with exit code 5 - indistinguishable from a discovery failure.
        run: dotnet test TwilightBoxart.slnx -c Release --no-build
